<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: sans-serif;
      font-size: 13px;
      min-width: 200px;
      padding: 12px 16px;
      background: #1e1e2e;
      color: #cdd6f4;
      margin: 0;
    }
    h2 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #00c040;
    }
    .row { margin: 4px 0; }
    .label { color: #888; }
    .value { font-weight: bold; }
    .error { color: #f38ba8; }
    .calendar-link { display: inline-block; margin-top: 10px; color: #89b4fa; font-size: 12px; }
    .calendar-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h2>Firefox Nightly Countdown</h2>
  <div id="content">Loading…</div>
  <a class="calendar-link" href="https://whattrainisitnow.com/calendar/">Open release calendar</a>
  <script src="popup.js"></script>
</body>
</html>
